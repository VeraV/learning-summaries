<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Summaries</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface-raised: #1e222d;
    --border: #2a2f3c;
    --text: #e4e6ed;
    --text-muted: #8b90a0;
    --accent: #00bcd4;
    --accent-soft: rgba(0, 188, 212, 0.12);
    --bash-green: #00c9a7;
    --bash-green-soft: rgba(0, 201, 167, 0.1);
    --elastic-yellow: #fec514;
    --elastic-yellow-soft: rgba(254, 197, 20, 0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  /* Header */
  .header-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    font-weight: 400;
    margin-bottom: 10px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 48px;
  }

  /* Buttons */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    text-align: left;
  }

  .btn:hover {
    transform: translateY(-2px);
    background: var(--surface-raised);
  }

  .btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .btn-text .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .btn-text .title {
    font-weight: 600;
    font-size: 15px;
  }

  .btn-arrow {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* Per-button colors */
  .btn-bash { border-color: rgba(0, 201, 167, 0.25); }
  .btn-bash:hover { border-color: var(--bash-green); }
  .btn-bash .btn-icon { background: var(--bash-green-soft); }
  .btn-bash .label { color: var(--bash-green); }

  .btn-elastic { border-color: rgba(254, 197, 20, 0.25); }
  .btn-elastic:hover { border-color: var(--elastic-yellow); }
  .btn-elastic .btn-icon { background: var(--elastic-yellow-soft); }
  .btn-elastic .label { color: var(--elastic-yellow); }

  @media (max-width: 480px) {
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header-badge">Learning Summaries</div>
  <h1>My Dev Notes</h1>
  <p class="subtitle">Personal summaries from my learning journey</p>

  <div class="buttons">

    <a href="./bash-zsh-summary.html" class="btn btn-bash">
      <div class="btn-icon">⌨️</div>
      <div class="btn-text">
        <div class="label">Shell Scripting</div>
        <div class="title">Bash & Zsh</div>
      </div>
      <div class="btn-arrow">→</div>
    </a>

    <a href="./elasticsearch-kibana-summary.html" class="btn btn-elastic">
      <div class="btn-icon">🔍</div>
      <div class="btn-text">
        <div class="label">Search & Observability</div>
        <div class="title">Elasticsearch & Kibana</div>
      </div>
      <div class="btn-arrow">→</div>
    </a>

  </div>

</div>
</body>
</html>
